name: CI

on:
  push:
    branches: [main, master, 'claude/**']
  pull_request:
    branches: [main, master]

jobs:
  build:
    name: Type Check & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: client

      - name: Type check
        run: npx tsc --noEmit
        working-directory: client

      - name: Lint
        run: npx next lint --max-warnings 0 || true
        working-directory: client

      - name: Build
        run: npm run build
        working-directory: client
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://placeholder' }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY || 'placeholder' }}
          ADMIN_API_TOKEN: ${{ secrets.ADMIN_API_TOKEN || 'placeholder' }}
          NEXT_PUBLIC_APP_URL: 'https://example.com'

  test:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: client

      - name: Run tests
        run: npm test -- --run
        working-directory: client
